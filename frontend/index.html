<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Portal de Solicitações</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }

        input, button {
            margin: 5px;
            padding: 8px;
        }

        button {
            cursor: pointer;
        }
    </style>
</head>

<body>
  <div class="container">
  <h1>📋 Portal de Solicitações</h1>

  <h3>Login</h3>
  <input id="username" placeholder="Usuário">
  <input id="password" type="password" placeholder="Senha">
  <button onclick="login()">Login</button>

  <h3>Criar Solicitações</h3>
  <input id="titulo" placeholder="Título">
  <input id="descricao" placeholder="Descrição">
  <button onclick="criar()">Criar</button>

  <pre id="resultado"></pre>

  <script>
    let token = "";

    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      const form = new URLSearchParams();
      form.append("username", username);
      form.append("password", password);

      const res = await fetch("http://127.0.0.1:8000/auth/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded",
        },
        body: form,
      });

      const data = await res.json();

      if (!res.ok) {
        token = "";
        document.getElementById("resultado").textContent =
          "❌ Erro no login: " + (data.detail ?? JSON.stringify(data));
        return;
      }

      token = data.access_token; // <-- certo: access_token
      document.getElementById("resultado").textContent = "✅ Login realizado!";
    }

    async function criar() {
      if (!token) {
        document.getElementById("resultado").textContent =
          "⚠️ Faça login antes de criar uma solicitação.";
        return;
      }

      const res = await fetch("http://127.0.0.1:8000/solicitacoes/", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + token,
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          titulo: document.getElementById("titulo").value,
          descricao: document.getElementById("descricao").value,
          categoria: "Hardware",
          prioridade: "Alta",
        }),
      });

      const data = await res.json();

      if (!res.ok) {
        document.getElementById("resultado").textContent =
          "❌ Erro ao criar: " + (data.detail ?? JSON.stringify(data));
        return;
      }

      document.getElementById("resultado").textContent =
        "✅ Criada!\n\n" + JSON.stringify(data, null, 2);
    }
  </script>
  </div>  
</body>
</html>
